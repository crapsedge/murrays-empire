<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contact | Murrays Empire LLC</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #F8F6F2;
      --bg-secondary: #FFFFFF;
      --text-main: #111111;
      --text-dim: #5A5A5A;
      --accent: #1F3A5F;
      --border: #E6E2DC;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-primary);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      line-height: 1.8;
      padding: 8vw 5vw;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .back-nav {
      margin-bottom: 60px;
    }

    .back-nav a {
      text-decoration: none;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    h1 {
      font-size: clamp(32px, 5vw, 60px);
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--accent);
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 18px;
      color: var(--text-dim);
      margin-bottom: 60px;
      display: block;
    }

    .contact-card {
      padding: 60px 40px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-align: center;
    }

    .contact-card h2 {
      font-size: 14px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .email-link {
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 700;
      color: var(--text-main);
      text-decoration: none;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 5px;
      transition: color 0.2s;
    }

    .email-link:hover {
      color: var(--accent);
    }

    .location-note {
      margin-top: 40px;
      font-size: 14px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .footer-note {
      margin-top: 100px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    @media (max-width: 768px) {
      body { padding: 15vw 6vw; }
      .contact-card { padding: 40px 20px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <nav class="back-nav">
      <a href="index.html">← Back to Portfolio</a>
    </nav>

    <header>
      <h1>Get In Touch</h1>
      <span class="subtitle">For inquiries regarding our brands, partnerships, or support, please reach out via our direct channel.</span>
    </header>

    <div class="contact-card">
      <h2>Direct Correspondence</h2>
      <a href="mailto:murraysempirellc@gmail.com" class="email-link">murraysempirellc@gmail.com</a>
      <p class="location-note">Omaha, Nebraska</p>
    </div>

    <div class="footer-note">
      © 2026 Murrays Empire LLC. Private Corporate Inquiries.
    </div>
  </div>

</body>
</html>
